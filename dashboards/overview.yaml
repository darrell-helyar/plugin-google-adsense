# dashboards/overview.yaml — Overview tab for google-adsense.
#
# Declarative panels (no custom React widget). Four KPI tiles + one
# earnings-over-time line chart, all driven by SQL against goog_daily.
#
# Reference: docs/04-dashboards-declarative.md

title: Overview
db_engine: postgres
refresh_seconds: 60

panels:

  # ── KPI tiles ─────────────────────────────────────────────────────────────
  # `stat` panels coerce values to numeric — never return TEXT here or you'll
  # render "NaN". Units live in the label, not the value. See gotchas G-14.

  - id: earnings_30d
    type: stat
    label: Earnings — last 30 days
    query: >
      SELECT ROUND(COALESCE(SUM(estimated_earnings), 0), 2) AS value
      FROM goog_daily
      WHERE report_date >= (CURRENT_DATE - INTERVAL '30 days')
    fallback_empty: true

  - id: clicks_30d
    type: stat
    label: Clicks — last 30 days
    query: >
      SELECT COALESCE(SUM(clicks), 0) AS value
      FROM goog_daily
      WHERE report_date >= (CURRENT_DATE - INTERVAL '30 days')
    fallback_empty: true

  - id: avg_rpm
    type: stat
    label: Avg page RPM (30d)
    query: >
      SELECT ROUND(COALESCE(AVG(NULLIF(rpm, 0)), 0), 2) AS value
      FROM goog_daily
      WHERE report_date >= (CURRENT_DATE - INTERVAL '30 days')
    fallback_empty: true

  - id: current_balance
    type: stat
    label: Current balance (unpaid)
    # Current unpaid AdSense earnings, written to goog_sync_state by the sync
    # (key='balance'). Numeric only — currency lives in the label. Scalar
    # subquery + COALESCE so this ALWAYS returns exactly one row (0 until the
    # first balance is synced). A bare `WHERE key='balance'` returns zero rows
    # before then, which breaks the whole dashboard's load (B-fix v0.2.1).
    query: >
      SELECT ROUND(COALESCE((
        SELECT (value->>'amount')::numeric
        FROM goog_sync_state
        WHERE key = 'balance'
      ), 0), 2) AS value
    fallback_empty: true

  - id: last_sync_age
    type: stat
    label: Last sync (min ago)
    live: true
    refresh_seconds: 30
    query: >
      SELECT FLOOR(EXTRACT(EPOCH FROM (now() - MAX(completed_at))) / 60)::bigint AS value
      FROM job_runs
      WHERE job_id = 'sync:google-adsense' AND status = 'success'
    fallback_empty: true


  # ── Earnings over time ────────────────────────────────────────────────────
  # Single-series line chart: one point per day. x_label / y_label propagate to
  # the legend on NousViz core v0.9.4.8+. See appendix-gotchas.md G-16.

  - id: earnings_over_time
    type: line_chart
    label: Estimated earnings per day (30d)
    query: >
      SELECT
        to_char(report_date, 'YYYY-MM-DD') AS date,
        ROUND(estimated_earnings, 2)       AS earnings
      FROM goog_daily
      WHERE report_date >= (CURRENT_DATE - INTERVAL '30 days')
      ORDER BY report_date
    x_key: date
    y_key: earnings
    x_label: Date
    y_label: Earnings
    fallback_empty: true
